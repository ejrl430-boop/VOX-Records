<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDITION | VOX RECORDS</title>
    
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* Specific Styles for Audition Guide */
        .audition-page-container {
            max-width: 900px;
            margin: 120px auto 100px;
            padding: 50px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .audition-header h1 {
            font-size: 60px;
            font-weight: 800;
            margin-bottom: 50px;
            text-align: center;
            color: #fff;
            letter-spacing: 2px;
        }

        .audition-section {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .section-text {
            font-size: 16px;
            line-height: 1.6;
            color: #ddd;
        }

        .cta-container {
            text-align: center;
            margin-top: 60px;
        }

        .cta-button {
            display: inline-block;
            background: var(--accent-color);
            color: #fff;
            padding: 20px 80px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: #d32f2f;
            transform: translateY(-5px);
        }

        .cta-button.disabled {
            pointer-events: none;
            opacity: 0.5;
            background: #555;
        }

        @media (max-width: 768px) {
            .audition-page-container { margin: 100px 20px; padding: 30px; }
            .audition-header h1 { font-size: 40px; }
        }
    </style>
</head>
<body class="audition-guide">

    <header>
        <a href="./index.html" class="logo">VOX RECORDS</a>
        <nav>
            <ul>
                <li><a href="./index.html#about">About</a></li>
                <li><a href="./index.html#artists">Artists</a></li>
                <li><a href="./index.html#news">News</a></li>
                <li><a href="./audition.html">Audition</a></li>
                <li><a href="./index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="video-background">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="./F.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <main class="audition-page-container">
        <div class="audition-header">
            <h1>AUDITION</h1>
        </div>

        <div class="audition-content">
            <section class="audition-section">
                <h2 class="section-title">1. 지원 자격</h2>
                <p class="section-text">2008년생~2013년생 남자</p>
            </section>

            <section class="audition-section">
                <h2 class="section-title">2. 지원 분야</h2>
                <p class="section-text">보컬, 랩, 댄스</p>
            </section>

            <section class="audition-section">
                <h2 class="section-title">3. 사전 접수 기간</h2>
                <p class="section-text">2026.04.01. ~ 2026.04.30.</p>
            </section>

            <section class="audition-section">
                <h2 class="section-title">4. 지원 방법</h2>
                <p class="section-text">하단 '지원하기' 버튼을 클릭하여 접수</p>
            </section>

            <p style="font-size: 14px; color: #888; margin-top: 20px;">· 오디션 결과는 합격자에 한하여 개별 공지드립니다.</p>

            <div class="cta-container">
                <a href="./audition_apply.html" class="cta-button" id="applyButton">지원하기</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="copyright">© 2026 VOX RECORDS. ALL RIGHTS RESERVED.</div>
    </footer>

    <script src="./js/main.js"></script>
</body>
</html>
