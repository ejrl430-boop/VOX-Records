<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPLY | VOX RECORDS</title>
    
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .apply-container {
            max-width: 800px;
            margin: 120px auto 100px;
            padding: 40px;
            background: #fff;
            color: #000;
            position: relative;
            z-index: 10;
        }

        .apply-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 40px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .apply-form section {
            margin-bottom: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .required { color: #ff3e3e; margin-left: 3px; }

        .form-field input, .form-field select, .form-field textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .date-select-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .helper-text { font-size: 12px; color: #888; margin-top: 5px; }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-label input { width: auto; margin-right: 8px; }

        .file-input-wrapper {
            border: 2px dashed #ddd;
            padding: 30px;
            text-align: center;
            margin-top: 10px;
        }

        .file-desc { font-size: 12px; color: #666; margin-bottom: 10px; }

        .consent-section {
            background: #f9f9f9;
            padding: 20px;
            margin-top: 40px;
        }

        .consent-detail-content {
            font-size: 12px;
            color: #666;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 15px;
            margin-top: 10px;
            background: #fff;
        }

        .submit-button {
            width: 100%;
            padding: 20px;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .submit-button:hover { opacity: 0.8; }

        @media (max-width: 768px) {
            .apply-container { margin: 80px 15px; padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="apply-page">

    <header style="background: rgba(255,255,255,0.9); border-bottom: 1px solid #eee;">
        <a href="./index.html" class="logo" style="color: #000;">VOX RECORDS</a>
        <nav>
            <ul>
                <li><a href="./index.html#about" style="color: #000;">About</a></li>
                <li><a href="./index.html#artists" style="color: #000;">Artists</a></li>
                <li><a href="./index.html#news" style="color: #000;">News</a></li>
                <li><a href="./audition.html" style="color: #000;">Audition</a></li>
                <li><a href="./index.html#contact" style="color: #000;">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="apply-container">
        <div class="apply-header">
            <h1>APPLY</h1>
        </div>

        <form id="applicationForm" class="apply-form">
            <section>
                <div class="form-row">
                    <div class="form-field">
                        <label>이름 <span class="required">*</span></label>
                        <input type="text" name="name" required placeholder="이름을 입력하세요">
                    </div>
                    <div class="form-field">
                        <label>성별 <span class="required">*</span></label>
                        <select name="gender" required>
                            <option value="male">남자</option>
                            <option value="female">여자</option>
                        </select>
                    </div>
                </div>

                <div class="form-field">
                    <label>생년월일 <span class="required">*</span> <span class="helper-text">(지원가능: 2008~2013년생)</span></label>
                    <div class="date-select-group">
                        <select name="birth_year" required>
                            <option value="">년도</option>
                            <script>
                                for(let i=2013; i>=2008; i--) document.write(`<option value="${i}">${i}</option>`);
                            </script>
                        </select>
                        <select name="birth_month" required>
                            <option value="">월</option>
                            <script>
                                for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}</option>`);
                            </script>
                        </select>
                        <select name="birth_day" required>
                            <option value="">일</option>
                            <script>
                                for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);
                            </script>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label>연락처 <span class="required">*</span></label>
                        <input type="tel" name="phone" required placeholder="숫자만 입력">
                    </div>
                    <div class="form-field">
                        <label>비상연락처 <span class="required">*</span></label>
                        <input type="tel" name="emergency_phone" required placeholder="숫자만 입력">
                    </div>
                </div>

                <div class="form-field">
                    <label>이메일 <span class="required">*</span></label>
                    <input type="email" name="email" required placeholder="이메일 주소">
                </div>
            </section>

            <section>
                <div class="form-field">
                    <label>지원 분야 <span class="required">*</span></label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="field" value="vocal"> 보컬</label>
                        <label class="checkbox-label"><input type="checkbox" name="field" value="rap"> 랩</label>
                        <label class="checkbox-label"><input type="checkbox" name="field" value="dance"> 댄스</label>
                    </div>
                </div>

                <div class="form-field">
                    <label>자기소개</label>
                    <textarea name="introduction" rows="4" placeholder="자기소개를 입력하세요"></textarea>
                </div>
            </section>

            <section>
                <div class="form-field">
                    <label>사진 (초상 1장, 전신 1장) <span class="required">*</span></label>
                    <p class="file-desc">jpg, png / 최대 50MB</p>
                    <div class="file-input-wrapper">
                        <input type="file" name="photos" multiple required>
                    </div>
                </div>
                <div class="form-field">
                    <label>영상 (보컬/댄스 등) <span class="required">*</span></label>
                    <p class="file-desc">mp4, mov / 최대 300MB</p>
                    <div class="file-input-wrapper">
                        <input type="file" name="videos" multiple required>
                    </div>
                </div>
            </section>

            <section class="consent-section">
                <label class="checkbox-label">
                    <input type="checkbox" name="privacyConsent" required>
                    <span>개인정보 수집 및 이용 동의 [필수]</span>
                </label>
                <div class="consent-detail-content">
                    [개인정보 수집 및 이용 안내]<br>
                    - 수집 목적: 오디션 지원 접수 및 심사<br>
                    - 수집 항목: 이름, 성별, 생년월일, 연락처, 이메일, 사진, 영상 등<br>
                    - 보유 기간: 오디션 종료 후 1년 내 파기
                </div>
            </section>

            <button type="submit" class="submit-button">제출하기</button>
        </form>
    </main>

    <footer>
        <div class="copyright">© 2026 VOX RECORDS. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
        document.getElementById('applicationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('지원서가 성공적으로 제출되었습니다.');
            window.location.href = './index.html';
        });
    </script>
</body>
</html>
